<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tekestat ADMIN - Élő Kezelő</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        /* Ide másold be a tkstat100.html teljes <style> részét, 
           hogy ugyanúgy nézzen ki, mint az eredeti! */
        :root { --cyan: #00d4ff; --orange: #ff8c00; --panel-bg: rgba(10, 12, 18, 0.95); }
        body { background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; padding: 20px; }
        /* ... (többi stílus) ... */
    </style>
</head>
<body onload="init()">

<div class="main-hud-panel">
    </div>

<script>
    // 1. A SAJÁT FIREBASE CONFIGOD IDE:
    const firebaseConfig = {
        apiKey: "IDE_MÁSOLD_AZ_API_KULCSOT",
        authDomain: "PROJEKTID.firebaseapp.com",
        databaseURL: "https://PROJEKTID.firebaseio.com",
        projectId: "PROJEKTID",
        storageBucket: "PROJEKTID.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. A CSAPAT ADATBÁZIS (db) IDE:
    const db = {
        "Justicia": ["Horváth Attila", "Dugár Péter", ...],
        // ... (másold be az összes csapatot a tkstat100-ból)
    };

    // 3. MÓDOSÍTOTT MENTÉS (localStorage helyett Firebase)
    function save() {
        const data = {};
        // Összeszedjük az összes beírt adatot
        document.querySelectorAll('input').forEach(i => data[i.id] = i.value);
        document.querySelectorAll('.selected-option').forEach(i => data[i.id] = i.innerText);
        
        // Elküldjük a felhőbe
        database.ref('meccs/allas').set(data);
    }

    // 4. MÓDOSÍTOTT BETÖLTÉS (Firebase-ből induláskor)
    function load() {
        database.ref('meccs/allas').once('value', (snap) => {
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    const el = document.getElementById(id);
                    if(el) {
                        if(el.tagName === 'INPUT') el.value = data[id];
                        else el.innerText = data[id];
                    }
                });
                updateAll();
            }
        });
    }

    // ... Ide másold be a tkstat100.html többi függvényét (init, updateAll, etc.)
    // De az updateAll() végén mindig hívd meg a save() függvényt!
</script>
</body>
</html>
