<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tekestat ADMIN - Élő Kezelőfelület</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        /* Itt maradhat a tkstat100.html összes eredeti CSS stílusa */
        :root { --cyan: #00d4ff; --orange: #ff8c00; --panel-bg: rgba(10, 12, 18, 0.95); }
        body { background: #1a1a1a; margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; color: white; }
        .main-hud-panel { background: var(--panel-bg); padding: 25px; display: flex; gap: 20px; border-radius: 4px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 5px; width: 60px; text-align: center; }
        .team-name { width: 100%; font-size: 20px; margin-bottom: 10px; }
        button { cursor: pointer; padding: 10px; background: #333; color: white; border: 1px solid #555; }
        .status-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #00d4ff; color: black; text-align: center; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-hud-panel">
    <div class="team-column">
        <input type="text" id="h-name" class="team-name" value="HAZAI CSAPAT" oninput="updateAll()">
        <div id="h-players">
            <input type="number" id="h1-p" placeholder="P" oninput="updateAll()">
            <input type="number" id="h1-f" placeholder="F" oninput="updateAll()">
        </div>
        <div style="font-size: 30px; margin-top: 20px;">Összesen: <span id="h-total">0</span></div>
    </div>

    <div style="text-align: center; align-self: center;">
        <div id="diff-val" style="font-size: 40px;">0</div>
        <button onclick="clearCloud()" style="background: red; margin-top: 20px;">TÖRLÉS</button>
    </div>

    <div class="team-column">
        <input type="text" id="v-name" class="team-name" value="VENDÉG CSAPAT" oninput="updateAll()">
        <div id="v-players">
            <input type="number" id="v1-p" placeholder="P" oninput="updateAll()">
            <input type="number" id="v1-f" placeholder="F" oninput="updateAll()">
        </div>
        <div style="font-size: 30px; margin-top: 20px;">Összesen: <span id="v-total">0</span></div>
    </div>
</div>

<div class="status-bar" id="status">Készen áll az élő adásra</div>

<script>
    // 1. KONFIGURÁCIÓ (Ide másold a sajátodat a Firebase-ből!)
    const firebaseConfig = {
        apiKey: "SAJÁT_API_KULCS",
        authDomain: "SAJÁT_PROJEKT.firebaseapp.com",
        databaseURL: "https://SAJÁT_PROJEKT.firebaseio.com",
        projectId: "SAJÁT_PROJEKT",
        storageBucket: "SAJÁT_PROJEKT.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. SZÁMOLÁS ÉS MENTÉS A FELHŐBE
    function updateAll() {
        let h = 0; let v = 0;
        
        // Összeadjuk a pontokat (példa 1-1 sorra, ezt bővítsd a többi mezővel)
        h += parseInt(document.getElementById('h1-p').value) || 0;
        v += parseInt(document.getElementById('v1-p').value) || 0;

        document.getElementById('h-total').innerText = h;
        document.getElementById('v-total').innerText = v;
        document.getElementById('diff-val').innerText = Math.abs(h - v);

        saveToCloud();
    }

    function saveToCloud() {
        const data = {};
        // Minden input tartalmát elmentjük
        document.querySelectorAll('input').forEach(i => data[i.id] = i.value);
        
        document.getElementById('status').innerText = "Menti...";
        
        db.ref('meccs/allas').set(data).then(() => {
            document.getElementById('status').innerText = "ÉLŐ - Adatok beküldve!";
            document.getElementById('status').style.background = "#00ff00";
        });
    }

    function clearCloud() {
        if(confirm("Biztosan törlöd a teljes állást?")) {
            document.querySelectorAll('input').forEach(i => i.value = "");
            updateAll();
        }
    }

    // Indításkor adatok betöltése a felhőből
    db.ref('meccs/allas').once('value', (snap) => {
        const d = snap.val();
        if(d) {
            Object.keys(d).forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = d[id];
            });
            updateAll();
        }
    });
</script>

</body>
</html>
